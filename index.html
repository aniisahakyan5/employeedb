<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Database | Movato</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Branding colors based on the provided UI Foundation Image */
            --primary: #00B8D9;
            --secondary: #1E2945;
            --bg-color: #F4F6F8;
            --text-dark: #1A1B24;
            --text-light: #FCFEFE;
            --accent-red: #F60F5E;
            --accent-purple: #A182F6;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
        }

        header {
            background-color: var(--secondary);
            color: var(--text-light);
            padding: 4.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 5px solid var(--primary);
        }

        /* Subtle radial gradient to give life to the header background */
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 184, 217, 0.12) 0%, rgba(30, 41, 69, 0) 50%);
            z-index: 0;
            pointer-events: none;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
            letter-spacing: -0.02em;
        }

        header p {
            font-size: 1.25rem;
            color: rgba(252, 254, 254, 0.85);
            position: relative;
            z-index: 1;
        }

        .main-content {
            padding: 2rem 2rem 5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .search-container {
            margin: -4.5rem auto 4rem;
            max-width: 600px;
            position: relative;
            z-index: 10;
            box-shadow: 0 12px 35px rgba(30, 41, 69, 0.1);
            border-radius: 50px;
        }

        .search-container i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary);
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .search-input {
            width: 100%;
            padding: 1.25rem 1.5rem 1.25rem 3.5rem;
            border-radius: 50px;
            border: none;
            background: var(--card-bg);
            color: var(--text-dark);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            box-shadow: 0 0 0 4px rgba(0, 184, 217, 0.25);
        }
        
        .search-input::placeholder {
            color: #9aa2b1;
        }

        .department-section {
            margin-bottom: 4rem;
            animation: fadeIn 0.8s ease-out backwards;
            /* Using loop-like animation delays down below via inline styling */
        }

        .department-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid rgba(0, 184, 217, 0.15);
        }

        .department-header h2 {
            font-size: 1.8rem;
            color: var(--secondary);
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .department-badge {
            background-color: rgba(0, 184, 217, 0.1);
            color: var(--primary);
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(30, 41, 69, 0.05);
        }

        /* Interactive side banner on card */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--primary);
            opacity: 0.8;
            transition: width 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(30, 41, 69, 0.08);
        }

        .card:hover::before {
            width: 8px;
            background: var(--primary);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-left: 8px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-light);
            box-shadow: 0 4px 10px rgba(30, 41, 69, 0.15);
            flex-shrink: 0;
            position: relative;
        }

        /* Small online indicator on avatar for liveliness */
        .avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #10B981;
            border: 3px solid var(--card-bg);
            border-radius: 50%;
        }

        .info {
            flex-grow: 1;
        }

        .info h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.2rem;
        }

        .info .position {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-top: 1.5rem;
            margin-left: 8px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #5A607F;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .icon-wrapper {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: rgba(30, 41, 69, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .detail-item a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .detail-item a:hover {
            color: var(--primary);
        }

        /* Hover effects for specific icons using the accent colors from palette */
        .card:hover .icon-wrapper.phone {
            background: rgba(0, 184, 217, 0.12);
            color: var(--primary);
        }
        
        .card:hover .icon-wrapper.email {
            background: rgba(161, 130, 246, 0.12);
            color: var(--accent-purple);
        }

        .card:hover .icon-wrapper.birthday {
            background: rgba(246, 15, 94, 0.12);
            color: var(--accent-red);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--secondary);
            opacity: 0.6;
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Management Interface Styles */
        .admin-toolbar {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 184, 217, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .card-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: none;
            gap: 0.5rem;
            z-index: 20;
        }

        .manage-mode .card-actions {
            display: flex;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .edit-btn { background: var(--accent-purple); }
        .edit-btn:hover { background: #8B65E6; }
        .delete-btn { background: var(--accent-red); }
        .delete-btn:hover { background: #D60D52; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 41, 69, 0.4);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .modal-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .modal-header h2 {
            color: var(--secondary);
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #5A607F;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #F0F2F9;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-footer .btn {
            flex: 1;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .grid { grid-template-columns: 1fr; }
            .search-container { margin: -3rem 1.5rem 3rem; width: auto; }
            .main-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Employee Database</h1>
        <p>Complete data records of all Movato personnel</p>
    </header>

    <div class="main-content">
        <div class="search-container">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search by name, position, department or email...">
        </div>

        <div id="departmentsContainer">
            <!-- Dynamic Content will be loaded here -->
        </div>
    </div>

    <div class="admin-toolbar">
        <button class="btn btn-secondary" id="manageBtn">
            <i class="fa-solid fa-lock-open"></i> <span id="manageBtnText">Manage Directory</span>
        </button>
        <button class="btn btn-primary" id="addBtn" style="display: none;">
            <i class="fa-solid fa-plus"></i> Add Employee
        </button>
    </div>

    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Employee</h2>
            </div>
            <form id="employeeForm">
                <input type="hidden" id="empId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="empName" class="form-control" required placeholder="Ani">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="empSurname" class="form-control" required placeholder="Isahakyan">
                    </div>
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" id="empPosition" class="form-control" required placeholder="Business Analyst">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="empDept" class="form-control" required placeholder="Product & Design">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="empEmail" class="form-control" required placeholder="ani@movato.com">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Phone (no +)</label>
                        <input type="text" id="empPhone" class="form-control" required placeholder="374 91 234567">
                    </div>
                    <div class="form-group">
                        <label>Birthday</label>
                        <input type="text" id="empBday" class="form-control" placeholder="September 1">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Employee</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Global array to hold DB data fetched from Vercel Postgres
        let employees = [];
        let isManageMode = false;

        const container = document.getElementById('departmentsContainer');
        const searchInput = document.getElementById('searchInput');
        const manageBtn = document.getElementById('manageBtn');
        const manageBtnText = document.getElementById('manageBtnText');
        const addBtn = document.getElementById('addBtn');
        const modal = document.getElementById('employeeModal');
        const form = document.getElementById('employeeForm');

        function formatPhoneHref(phone) {
            let clean = phone.replace(/\s+/g, '');
            if (!clean.startsWith('+')) clean = '+' + clean;
            return `tel:${clean}`;
        }

        function getInitials(name, surname) {
            return `${name.charAt(0)}${surname.charAt(0)}`.toUpperCase();
        }

        function groupEmployees(data) {
            return data.reduce((acc, emp) => {
                if (!acc[emp.department]) acc[emp.department] = [];
                acc[emp.department].push(emp);
                return acc;
            }, {});
        }

        function createCard(emp) {
            return `
                <div class="card">
                    <div class="card-actions">
                        <button class="action-btn edit-btn" onclick="openModal(${emp.id})"><i class="fa-solid fa-pen"></i></button>
                        <button class="action-btn delete-btn" onclick="deleteEmployee(${emp.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="card-header">
                        <div class="avatar">${getInitials(emp.name, emp.surname)}</div>
                        <div class="info">
                            <h3>${emp.name} ${emp.surname}</h3>
                            <div class="position">${emp.position}</div>
                        </div>
                    </div>
                    <div class="details">
                        <div class="detail-item">
                            <div class="icon-wrapper phone"><i class="fa-solid fa-phone"></i></div>
                            <a href="${formatPhoneHref(emp.phone)}">+${emp.phone}</a>
                        </div>
                        <div class="detail-item">
                            <div class="icon-wrapper email"><i class="fa-solid fa-envelope"></i></div>
                            <a href="mailto:${emp.email}">${emp.email}</a>
                        </div>
                        ${emp.birthday ? `
                        <div class="detail-item">
                            <div class="icon-wrapper birthday"><i class="fa-solid fa-cake-candles"></i></div>
                            <span>${emp.birthday}</span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderDirectory(data) {
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-face-frown-open"></i>
                        <h2>No employees found</h2>
                        <p>Try adjusting your search criteria</p>
                    </div>`;
                return;
            }

            // Apply manage-mode class to container
            if (isManageMode) {
                container.classList.add('manage-mode');
            } else {
                container.classList.remove('manage-mode');
            }

            const grouped = groupEmployees(data);
            const priorityOrder = ["Executive & Management", "Engineering", "QA & DevOps", "Product & Design", "IT Support"];
            const allDepts = Object.keys(grouped);
            
            const finalOrder = [
                ...priorityOrder.filter(dept => allDepts.includes(dept)),
                ...allDepts.filter(dept => !priorityOrder.includes(dept))
            ];
            
            container.innerHTML = finalOrder.map((dept, idx) => {
                const deptEmps = grouped[dept];
                if (!deptEmps || deptEmps.length === 0) return '';
                const delay = idx * 0.15;
                return `
                    <div class="department-section" style="animation-delay: ${delay}s">
                        <div class="department-header">
                            <h2>${dept}</h2>
                            <span class="department-badge">${deptEmps.length} Members</span>
                        </div>
                        <div class="grid">
                            ${deptEmps.map(emp => createCard(emp)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Management Logic
        manageBtn.onclick = () => {
            isManageMode = !isManageMode;
            manageBtnText.innerText = isManageMode ? "Exit Manage Mode" : "Manage Directory";
            addBtn.style.display = isManageMode ? "flex" : "none";
            renderDirectory(employees);
        };

        addBtn.onclick = () => openModal();

        window.openModal = (id = null) => {
            modal.style.display = 'flex';
            if (id) {
                const emp = employees.find(e => e.id === id);
                document.getElementById('modalTitle').innerText = "Edit Employee";
                document.getElementById('empId').value = emp.id;
                document.getElementById('empName').value = emp.name;
                document.getElementById('empSurname').value = emp.surname;
                document.getElementById('empPosition').value = emp.position;
                document.getElementById('empDept').value = emp.department;
                document.getElementById('empEmail').value = emp.email;
                document.getElementById('empPhone').value = emp.phone;
                document.getElementById('empBday').value = emp.birthday || '';
            } else {
                document.getElementById('modalTitle').innerText = "Add New Employee";
                form.reset();
                document.getElementById('empId').value = '';
            }
        };

        window.closeModal = () => {
            modal.style.display = 'none';
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                id: document.getElementById('empId').value,
                name: document.getElementById('empName').value,
                surname: document.getElementById('empSurname').value,
                position: document.getElementById('empPosition').value,
                department: document.getElementById('empDept').value,
                email: document.getElementById('empEmail').value,
                phone: document.getElementById('empPhone').value,
                birthday: document.getElementById('empBday').value
            };

            const btn = form.querySelector('button[type="submit"]');
            btn.innerText = "Saving...";
            
            try {
                const res = await fetch('/api/save-employee', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Save failed');
                await fetchEmployees();
                closeModal();
            } catch (err) {
                alert('Error saving employee: ' + err.message);
            } finally {
                btn.innerText = "Save Employee";
            }
        };

        window.deleteEmployee = async (id) => {
            if (!confirm('Are you sure you want to delete this employee?')) return;
            try {
                const res = await fetch('/api/delete-employee', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                if (!res.ok) throw new Error('Delete failed');
                await fetchEmployees();
            } catch (err) {
                alert('Error deleting employee: ' + err.message);
            }
        };

        async function fetchEmployees() {
            try {
                const response = await fetch('/api/employees');
                employees = await response.json();
                renderDirectory(employees);
            } catch (error) {
                container.innerHTML = `<div class="empty-state"><h2>Error loading data</h2></div>`;
            }
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = employees.filter(emp => {
                const fullName = `${emp.name} ${emp.surname}`.toLowerCase();
                return fullName.includes(term) || 
                       emp.position.toLowerCase().includes(term) || 
                       emp.email.toLowerCase().includes(term) ||
                       emp.department.toLowerCase().includes(term) ||
                       emp.phone.replace(/\s+/g, '').includes(term.replace(/\s+/g, ''));
            });
            renderDirectory(filtered);
        });

        document.addEventListener('DOMContentLoaded', fetchEmployees);
    </script>
</body>
</html>
